<!DOCTYPE html>
<html lang="en">
<head>
    <title>Simple Table</title>
</head>
<body>

<h2>Simple Table Example</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>ALI</td>
            <td>30</td>
               <td>Multan</td>
        </tr>
        <tr>
            <td>Zohaib</td>
            <td>25</td>
               <td>DG khan</td>
        </tr>
        <tr>
            <td>Salman</td>
            <td>35</td>
               <td>Dera Ismail Khan</td>
        </tr>
    </tbody>
</table>

</body>
</html>
